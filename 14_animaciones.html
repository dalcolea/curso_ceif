<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animaciones css</title>
    <style>
        div {margin:auto}

        /*animaciones con transition*/
        .box1 {
            width: 100px;
            height: 100px;
            background-color: blueviolet;
            transition: background-color 1s ease, width 1s ease, height 1s ease;
        }

        .box1:hover {
            background-color: bisque;
            width: 200px;
            height: 200px;
        }

        /*animaciones con transform*/
        .box2 {
            width: 100px;
            height: 100px;
            background-color: blueviolet;
            transition: transform 1s ease;
        }

        .box2:hover {
            transform: scale(1.5) rotate(45deg);
        }

        /*animaciones con keyframes*/
        .box3 {
            width: 100px;
            height: 100px;
            border: 1px solid black;
            background-color: goldenrod;
            animation: movercaja 2s ease infinite alternate;
        }

        @keyframes movercaja {
            from {
                transform: translateX(0);
            }
            to {
                transform: translateX(200px);
                background-color: aliceblue;
            }
        }
    </style>
</head>

<body>
    <div class="box1"></div>
    <hr>
    <div class="box2"></div>
    <hr>
    <div class="box3"></div>
</body>
</html>
