<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Queries</title>
    <style>
       /*utilizar rem, vh, vw o %*/
       .container{
          display: flex ;
          gap:10px;
          background-color: lightblue;
          /* flex-direction: column; */
        }

        .box{
          flex: 1; /*tiene prioridad sobre width*/
          min-width: 200px;
          height: 100px;
          background-color: red;
        }

        @media (max-width: 768px) {
          .container{
            flex-direction: column;
            flex-wrap: wrap;
          }
        }
    </style>
</head>
<body>
    <div class="container">
       <div class="box">1</div>
       <div class="box">2</div>
       <div class="box">3</div>
    </div>
</body>
</html>
