<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- info de la pagina -->
    <meta name="description" content="Etiqueta meta">
    <meta name="author" content="David Alcolea">
    <meta name="keywords" content="HTML, meta, ejemplo">
    <meta name="robots" content="index, follow"> 
    <!-- con noindex no posiciona la página 
    con nofollow no sigue los enlaces -->

    <!-- usado por redes sociales    -->
    <meta property="og:title" content="Ejemplo de tabla en HTML">
    <meta property="og:description" content="Este es un ejemplo de cómo usar la etiqueta meta en HTML.">
    <meta property="og:image" content="https://example.com/meta.png">
    <meta property="og:url" content="https://example.com/01_etiqueta_meta.html">

    <!-- meta para control de cache -->
    <meta http-equiv="cache-control" content="no-cache">
    <meta http-equiv="expires" content="0">   
      
    <!-- meta para geolocalizacion -->
    <meta name="geo.region" content="ES">
    <meta name="geo.placename" content="Madrid">  
    <meta name="geo.position" content="40.4168;-3.7038">
    <meta name="ICBM" content="40.4168, -3.7038">
         
    <title>Meta</title>
</head>
<body>
    <h1>Etiqueta Meta</h1>
</body>
